<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>BIT4A Lifecycle Dashboard</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-html { height: 100%; }
            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: linear-gradient(135deg, #000000 0%, #63346C 45%, #BE70CC 80%, #FFE18E 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-font-smoothing: antialiased;
            }
            .staticrypt-content {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-page {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                box-sizing: border-box;
            }
            .staticrypt-form {
                background: white;
                border-radius: 16px;
                padding: 40px 36px 36px;
                width: 100%;
                max-width: 380px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                text-align: center;
                box-sizing: border-box;
            }
            .staticrypt-instructions { margin-bottom: 24px; }
            .staticrypt-title {
                font-size: 22px;
                font-weight: 700;
                color: #63346C;
                margin: 0 0 8px;
            }
            .staticrypt-instructions p:last-child {
                font-size: 13px;
                color: #64748b;
                margin: 0;
            }
            .staticrypt-hr { display: none; }
            .staticrypt-password-container {
                position: relative;
                margin-bottom: 12px;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                padding: 12px 44px 12px 16px;
                border: 2px solid #EDD5F2;
                border-radius: 8px;
                font-size: 15px;
                outline: none;
                color: #1a202c;
                box-sizing: border-box;
                background: white;
            }
            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                border-color: #BE70CC;
            }
            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 50%;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                padding: 0;
            }
            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                padding: 13px;
                background: linear-gradient(135deg, #63346C, #BE70CC);
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                text-transform: none;
                margin-top: 4px;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                filter: brightness(108%);
            }
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
                font-size: 13px;
                color: #64748b;
                text-align: left;
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 8px;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid gray;
                border-right-color: transparent;
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
                animation-duration: 0.75s;
                animation-timing-function: linear;
                animation-delay: 0s;
                animation-iteration-count: infinite;
                animation-direction: normal;
                animation-fill-mode: none;
                animation-play-state: running;
                animation-name: spinner-border;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
