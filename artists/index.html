      font-weight: 700;
      color: #63346C;
      margin-bottom: 6px;

      color: #94a3b8;
      margin-bottom: 28px;

      margin-bottom: 16px;

    .staticrypt-decrypt-button {

      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.3px;

    .staticrypt-remember {

      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      cursor: pointer;

    .staticrypt-remember input { cursor: pointer; accent-color: #63346C; }
    .staticrypt-error { color: #dc2626; font-size: 13px; margin-top: 10px; }
